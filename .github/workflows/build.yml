name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac
            arch: arm64
            python-platform: aarch64-apple-darwin
          - os: macos-13
            platform: mac
            arch: x64
            python-platform: x86_64-apple-darwin
          - os: windows-latest
            platform: win
            arch: x64
            python-platform: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            platform: linux
            arch: x64
            python-platform: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    env:
      PYTHON_VERSION: "3.10.17"
      PYTHON_BUILD_TAG: "20250317"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      # --- Python Runtime ---

      - name: Download portable Python (macOS/Linux)
        if: matrix.platform != 'win'
        run: |
          TARBALL="cpython-${{ env.PYTHON_VERSION }}+${{ env.PYTHON_BUILD_TAG }}-${{ matrix.python-platform }}-install_only.tar.gz"
          URL="https://github.com/indygreg/python-build-standalone/releases/download/${{ env.PYTHON_BUILD_TAG }}/${TARBALL}"
          mkdir -p python/python-runtime
          echo "Downloading ${TARBALL}..."
          curl -L --progress-bar "$URL" | tar xz -C python/python-runtime --strip-components=1

      - name: Download portable Python (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $TARBALL = "cpython-${{ env.PYTHON_VERSION }}+${{ env.PYTHON_BUILD_TAG }}-${{ matrix.python-platform }}-install_only.tar.gz"
          $URL = "https://github.com/indygreg/python-build-standalone/releases/download/${{ env.PYTHON_BUILD_TAG }}/${TARBALL}"
          New-Item -ItemType Directory -Path python\python-runtime -Force | Out-Null
          Write-Host "Downloading ${TARBALL}..."
          Invoke-WebRequest -Uri $URL -OutFile "python-standalone.tar.gz"
          tar xzf "python-standalone.tar.gz" -C python\python-runtime --strip-components=1
          Remove-Item "python-standalone.tar.gz"

      - name: Install Python deps (macOS)
        if: matrix.platform == 'mac'
        run: |
          python/python-runtime/bin/python3 -m pip install --upgrade pip --quiet
          python/python-runtime/bin/python3 -m pip install -r python/requirements.txt --quiet

      - name: Install Python deps (Linux)
        if: matrix.platform == 'linux'
        run: |
          python/python-runtime/bin/python3 -m pip install --upgrade pip --quiet
          python/python-runtime/bin/python3 -m pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu --quiet
          python/python-runtime/bin/python3 -m pip install -r python/requirements.txt --quiet

      - name: Install Python deps (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          python\python-runtime\python.exe -m pip install --upgrade pip --quiet
          python\python-runtime\python.exe -m pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu --quiet
          python\python-runtime\python.exe -m pip install -r python\requirements.txt --quiet

      - name: Clean Python runtime
        if: matrix.platform != 'win'
        run: |
          find python/python-runtime -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find python/python-runtime -name "*.pyc" -delete 2>/dev/null || true
          find python/python-runtime -type d -name "test" -path "*/site-packages/*/test" -exec rm -rf {} + 2>/dev/null || true
          find python/python-runtime -type d -name "tests" -path "*/site-packages/*/tests" -exec rm -rf {} + 2>/dev/null || true
          find python/python-runtime -name "libnvToolsExt*" -delete 2>/dev/null || true
          find python/python-runtime -name "libcudart*" -delete 2>/dev/null || true
          echo "Python runtime size:"
          du -sh python/python-runtime

      - name: Clean Python runtime (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          Get-ChildItem -Path python\python-runtime -Recurse -Directory -Filter "__pycache__" -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force
          Get-ChildItem -Path python\python-runtime -Recurse -Filter "*.pyc" -ErrorAction SilentlyContinue | Remove-Item -Force

      # --- Build ---

      - name: Build Electron app
        run: npm run build

      - name: Package (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}

      - name: Package (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --x64 --publish never

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --x64 --publish never

      # --- Upload ---

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VoiceLab-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.yml
            dist/*.yaml
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
